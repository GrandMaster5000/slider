<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        @import url('https://unpkg.com/swiper@7/swiper-bundle.min.css');
        .container {
            padding: 50px;
            background-color: black;
        }
        .swiper {
            width: 345px;
            height: 102px;
            padding-top: 20px;
        }

        .swiper-pagination-class {
            top: -10px;
        }

        .swiper-pagination-class :first-child {
            margin-right: 15px;
        }

        .swiper-pagination-bullet {
            width: 164px;
            height: 3px;
            background-color: #BFBFBF;
            border: none;
            border-radius: 0%;
        }
        .swiper-pagination-bullet-active {
            background-color: #FF00CC !important;
        }

        .swp-story-img-wrp {
            background-image: url('./image/5c78f2568b18a1693872.png');
            width: 75px;
            height: 76px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swp-storys {
            display: flex;
            gap: 15px;
        }

        .swp-story-text {
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            color: #fff
        }
        .cyrcle-img {
            width: 62.5px;
            height: 62.5px;
            border-radius: 50%;
        }
    </style>
    <div class="container">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                   <div class='swp-storys'>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img class="cyrcle-img" src="https://thumb.tildacdn.com/tild3038-3131-4036-b565-613837303663/-/format/webp/242303233_2708430756.jpg" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img class="cyrcle-img" src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="cyrcle-img" class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img class="cyrcle-img" src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img class="cyrcle-img" src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                   </div>
                </div>
                <div class="swiper-slide">
                   <div class='swp-storys'>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img class="img-cyrcle" src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                        <div class="swp-story-wrapper">
                            <div class="swp-story-img-wrp">
                                <img src="./image/Ellipse 16.png" alt="story">
                            </div>
                            <div class="swp-story-text">756k</div>
                        </div>
                   </div>
                </div>
                
            </div>    
                <div class="swiper-pagination swiper-pagination-class"></div>
            
        </div>

    </div>
    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
    <script type="module">
        import Swiper from 'https://unpkg.com/swiper@7/swiper-bundle.esm.browser.min.js'

        const swiper = new Swiper('.swiper', {
            // loop: true,

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
                modifierClass: '.swiper-pagination-class'
            },

            centeredSlides: true,
            longSwipes: false,
            spaceBetween: 15
        });
    </script>
</body>
</html>
