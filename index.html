<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><div><img src="./image/Rectangle 17.png" alt="photo"></div></div>
                <div class="swiper-slide"><img src="./image/Rectangle 79.png" alt="photo"></div>
                <div class="swiper-slide"><img src="./image/Rectangle 17.png" alt="photo"></div>
            </div>
            <div class="swiper-pagination swiper-pagination-class"></div>
        </div>
        
    </div>


    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
    <script type="module">
        import Swiper from 'https://unpkg.com/swiper@7/swiper-bundle.esm.browser.min.js'

        const swiper = new Swiper('.swiper', {
            // loop: true,

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
                modifierClass: '.swiper-pagination-class'
            },

            centeredSlides: true,
            longSwipes: false,
            spaceBetween: 15
        });
    </script>
</body>
</html>
