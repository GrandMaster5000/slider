<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        @import url('https://unpkg.com/swiper@7/swiper-bundle.min.css');
        @font-face {
            font-family: 'Benzin';
            src: url('http://yoursite.com/gerbera/Gerbera-Medium.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Ubuntu';
            src: url('http://yoursite.com/gerbera/Gerbera-Bold.woff') format('woff');
            font-weight: 700;
            font-style: bold;
        }
        .container {
            padding-top: 50px;
            background-color: black;
        }
        .big-swiper {
            width: 345px;
            height: 810px;
        }

        .swiper-pagination-class {
            top: 118px;
        }

        .swiper-pagination-bullet {
            width: 75px;
            height: 3px;
            background-color: #BFBFBF;
            border: none;
            border-radius: 0%;
            margin: 0 4px;
        }
        .swiper-pagination-bullet-active {
            background-color: #FF00CC !important;
        }

        .text-container {
            width: 345px;
            display: none;
        }

        .active-text {
            display: block;
        }

        .text-title {
            color: #FFFFFF;
            font-family: Benzin;
            font-weight: normal;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 40px;
        }

        .text-descr {
            font-family: Ubuntu;
            font-weight: normal;
            font-size: 16px;
            color: #BFBFBF;
            margin-bottom: 40px;
            line-height: 150%;
            height: 48px;
        }

        .img-gif-slider {
            width: 300px;
            height: 649.6px;
            border-radius: 20px;
            margin: 0 23px;
        }

    </style>
    <div class="container">
        <div class="swiper big-swiper">
            <div class="texts-container">
                <div id="firstText" class="text-container active-text">
                    <h3 class="text-title"><span>1</span><span>Нативный пост</span></h3>
                    <div class="text-descr">Блогер делает нативный <br> пост с подборкой товаров</div>
                </div>
                <div id="secondText" class="text-container">
                    <h3 class="text-title"><span>2</span><span>Витрина блогера</span></h3>
                    <div class="text-descr">Подписчики переходят по ссылке в шапке профиля в витрину блогера</div>
                </div>
                <div id="thirdText" class="text-container">
                    <h3 class="text-title"><span>3</span><span>Переход в магазин</span></h3>
                    <div class="text-descr">В витрине находят образ, кликают на товар и переходят в магазин</div>
                </div>
                <div id="fourthText" class="text-container">
                    <h3 class="text-title"><span>4</span><span>Заказ товаров</span></h3>
                    <div class="text-descr">Выбирают размер и делают заказ в магазине</div>
                </div>
            </div>
            <div class="swiper-pagination swiper-pagination-class"></div>
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img class='img-gif-slider'src="https://static.tildacdn.com/tild3739-3434-4135-b437-386465313438/01-min.gif" alt="img">
                </div>
                <div class="swiper-slide">
                    <img class='img-gif-slider' src="https://static.tildacdn.com/tild3962-3331-4063-b961-653136663439/02-min.gif" alt="img">
                </div>
                <div class="swiper-slide">
                    <img class='img-gif-slider' src="https://static.tildacdn.com/tild3834-3465-4634-a339-643636346530/03-min.gif"" alt="img">
                </div>
                <div class="swiper-slide">
                    <img class='img-gif-slider' src="https://static.tildacdn.com/tild6364-3833-4839-b836-646534613233/04-min.gif" alt="img">
                </div>
            </div>    
        </div>
    </div>
    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
    <script type="module">
        import Swiper from 'https://unpkg.com/swiper@7/swiper-bundle.esm.browser.min.js'

        const swiper = new Swiper('.swiper', {
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
                modifierClass: '.swiper-pagination-class'
            },

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            centeredSlides: true,
            longSwipes: false,
            spaceBetween: 15
        });
        const firstText = document.querySelector('#firstText')
        const secondText = document.querySelector('#secondText')
        const thirdText = document.querySelector('#thirdText')
        const fourthText = document.querySelector('#fourthText')

        swiper.on('slideChange', function () {
            const texts = [firstText, secondText, thirdText, fourthText];
            texts[swiper.previousIndex].classList.remove('active-text')
            texts[swiper.activeIndex].classList.add('active-text')
        });
    </script>
</body>
</html>
